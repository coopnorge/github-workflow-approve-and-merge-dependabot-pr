on:
  pull_request:
jobs:
  techdocs:
    permissions:
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    name: TechDocs
    uses: coopnorge/github-workflow-techdocs/.github/workflows/techdocs.yaml@v0

  build:
    if: failure() || cancelled()
    needs:
      - techdocs
    runs-on: ubuntu-slim
    steps:
      - run: exit 1
    permissions: {}
